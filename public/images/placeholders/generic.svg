<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Base color from your site palette -->
  <rect width="800" height="500" fill="#3d4a38"/>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Centered project icon -->
  <g transform="translate(400, 250)">
    <!-- Simple project/folder icon -->
    <rect x="-60" y="-40" width="120" height="80" rx="5" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
    <rect x="-60" y="-40" width="50" height="20" rx="3" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>

    <!-- Horizontal line in center -->
    <line x1="-50" y1="0" x2="50" y2="0" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  </g>

  <!-- Subtle text -->
  <text x="400" y="450" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.3)" font-family="Arial, sans-serif" letter-spacing="2">PROJECT</text>
</svg>