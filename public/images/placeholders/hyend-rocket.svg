<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#0a0a0a"/>

  <!-- Left flanking line -->
  <line x1="50" y1="250" x2="290" y2="250" stroke="#555" stroke-width="1.5"/>
  <line x1="50" y1="240" x2="50" y2="260" stroke="#555" stroke-width="1.5"/>

  <!-- Right flanking line -->
  <line x1="510" y1="250" x2="750" y2="250" stroke="#555" stroke-width="1.5"/>
  <line x1="750" y1="240" x2="750" y2="260" stroke="#555" stroke-width="1.5"/>

  <!-- Globe circle -->
  <circle cx="400" cy="250" r="85" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>

  <!-- Star / lat-long dot field -->
  <g fill="#ffffff">
    <circle cx="370" cy="200" r="1.4" opacity="0.7"/>
    <circle cx="410" cy="195" r="1.2" opacity="0.5"/>
    <circle cx="440" cy="215" r="1.4" opacity="0.6"/>
    <circle cx="455" cy="240" r="1.2" opacity="0.5"/>
    <circle cx="450" cy="270" r="1.4" opacity="0.7"/>
    <circle cx="430" cy="290" r="1.2" opacity="0.5"/>
    <circle cx="400" cy="300" r="1.4" opacity="0.6"/>
    <circle cx="365" cy="295" r="1.2" opacity="0.5"/>
    <circle cx="345" cy="275" r="1.4" opacity="0.6"/>
    <circle cx="340" cy="245" r="1.2" opacity="0.5"/>
    <circle cx="345" cy="215" r="1.4" opacity="0.7"/>
    <circle cx="360" cy="190" r="1.2" opacity="0.5"/>
    <circle cx="385" cy="180" r="1.2" opacity="0.5"/>
    <circle cx="420" cy="182" r="1.4" opacity="0.6"/>
    <circle cx="452" cy="200" r="1.2" opacity="0.5"/>
    <circle cx="462" cy="225" r="1.4" opacity="0.7"/>
    <circle cx="460" cy="255" r="1.2" opacity="0.5"/>
    <circle cx="445" cy="280" r="1.4" opacity="0.6"/>
    <circle cx="415" cy="298" r="1.2" opacity="0.5"/>
    <circle cx="385" cy="300" r="1.4" opacity="0.6"/>
    <circle cx="355" cy="285" r="1.2" opacity="0.5"/>
    <circle cx="335" cy="260" r="1.4" opacity="0.6"/>
    <circle cx="335" cy="230" r="1.2" opacity="0.5"/>
    <circle cx="350" cy="205" r="1.4" opacity="0.6"/>
    <circle cx="380" cy="192" r="1.2" opacity="0.5"/>
    <circle cx="415" cy="190" r="1.4" opacity="0.6"/>
  </g>

  <!-- Diagonal rocket/dart crossing the globe -->
  <g fill="#ffffff">
    <polygon points="462,193 419.8,249.3 353,302 405.7,235.2" />
    <polygon points="353,302 336,318 356,309" />
    <polygon points="353,302 369,286 347,293" />
  </g>

  <!-- Text -->
  <text x="290" y="240" font-family="Arial, sans-serif" font-size="26" font-weight="600" fill="#bbb" letter-spacing="3" text-anchor="end">HYBRID ENGINE</text>
  <text x="510" y="240" font-family="Arial, sans-serif" font-size="26" font-weight="600" fill="#bbb" letter-spacing="3" text-anchor="start">DEVELOPMENT</text>
</svg>
