<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="epflGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8151f"/>
      <stop offset="100%" stop-color="#ff9d00"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="#0a0c10"/>

  <!-- Emblem circle -->
  <circle cx="210" cy="250" r="150" fill="url(#epflGrad)"/>

  <g stroke="#ffffff" stroke-width="9" stroke-linecap="round">
    <!-- stems from center to capsules -->
    <line x1="210" y1="250" x2="172" y2="212"/>
    <line x1="210" y1="250" x2="248" y2="288"/>
  </g>

  <!-- capsule (upper-left) -->
  <g transform="translate(150, 192) rotate(-45)">
    <rect x="-9" y="-26" width="18" height="52" rx="9" fill="#ffffff"/>
  </g>
  <!-- capsule (lower-right) -->
  <g transform="translate(270, 308) rotate(-45)">
    <rect x="-9" y="-26" width="18" height="52" rx="9" fill="#ffffff"/>
  </g>

  <!-- joint rings -->
  <circle cx="172" cy="212" r="8" fill="none" stroke="#ffffff" stroke-width="4"/>
  <circle cx="248" cy="288" r="8" fill="none" stroke="#ffffff" stroke-width="4"/>

  <!-- center hub -->
  <circle cx="210" cy="250" r="22" fill="#ffffff"/>
  <circle cx="210" cy="250" r="15" fill="url(#epflGrad)"/>

  <!-- signal sweep -->
  <path d="M 95 335 Q 130 300 165 275" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.9"/>

  <!-- Right flanking line -->
  <line x1="390" y1="250" x2="740" y2="250" stroke="#555" stroke-width="1.5"/>
  <line x1="740" y1="240" x2="740" y2="260" stroke="#555" stroke-width="1.5"/>

  <!-- Text -->
  <text x="390" y="230" font-family="Arial, sans-serif" font-size="30" font-weight="600" fill="#e8eef6" letter-spacing="3" text-anchor="start">EPFL SPACECRAFT</text>
  <text x="390" y="270" font-family="Arial, sans-serif" font-size="30" font-weight="600" fill="#e8eef6" letter-spacing="3" text-anchor="start">TEAM</text>
</svg>
